<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Clip | 4 FIRE UNITED</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="CSS/dashboard.css">

</head>

<body>

<div class="main">

    <div class="topbar">

        <h1>EDIT CLIP</h1>

        <a href="clips.html" class="back-btn">← Back</a>

    </div>

    <div class="edit-box">

        <input type="text" id="title" placeholder="Clip Title">

        <input type="text" id="playerName" placeholder="Player Name">

       <label>Thumbnail</label>

<input
    type="file"
    id="thumbnail"
    accept="image/*">

        <label>Clip Type</label>

<select id="clipType">

    <option value="youtube">YouTube</option>

    <option value="instagram">Instagram Reel</option>

    <option value="video">Upload Video</option>

</select>

<input
    type="url"
    id="videoUrl"
    placeholder="Video URL">

<input
    type="file"
    id="videoFile"
    accept="video/*"
    style="display:none;">

        <input type="text" id="category" placeholder="Category">

        <textarea id="description" placeholder="Description"></textarea>

        <div class="featured-option">

    <label>

        <input
            type="checkbox"
            id="featured">

        ⭐ Make this Featured Clip

    </label>

</div>

        <progress
    id="uploadProgress"
    value="0"
    max="100"
    style="display:none;width:100%;margin:15px 0;">
</progress>

<p
    id="uploadStatus"
    style="display:none;color:#ff7b00;font-weight:600;margin-bottom:15px;">
</p>

        <button id="updateClip" class="save-btn">
            Update Clip
        </button>

    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/edit-clip.js"></script>

</body>
</html>
