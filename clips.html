<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gameplay Clips | 4 FIRE UNITED</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<link rel="stylesheet" href="CSS/style.css">
<link rel="stylesheet" href="CSS/responsive.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#0b0b0b;
    color:#fff;
    font-family:Poppins,sans-serif;

}

.clips-section{

    width:90%;
    max-width:1400px;
    margin:120px auto 80px;

}

.clips-title{

    font-family:"Bebas Neue",sans-serif;
    font-size:70px;
    letter-spacing:2px;
    text-align:center;
    color:#ff7b00;
    margin-bottom:10px;

}

.clips-sub{

    text-align:center;
    color:#aaa;
    margin-bottom:50px;

}

.clips-grid{

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    gap:35px;

}

.clip-card{

    background:#171717;

    border-radius:18px;

    overflow:hidden;

    border:1px solid rgba(255,255,255,.08);

    transition:.35s;

}

.clip-card:hover{

    transform:translateY(-8px);

    border-color:#ff7b00;

    box-shadow:0 0 30px rgba(255,120,0,.25);

}

.clip-thumbnail{

    position:relative;

    overflow:hidden;

}

.clip-thumbnail img{

    width:100%;

    height:230px;

    object-fit:cover;

    transition:.4s;

}

.clip-card:hover img{

    transform:scale(1.08);

}

.play-btn{

    position:absolute;

    top:50%;

    left:50%;

    transform:translate(-50%,-50%);

    width:70px;

    height:70px;

    border-radius:50%;

    background:rgba(255,123,0,.92);

    display:flex;

    align-items:center;

    justify-content:center;

    color:#fff;

    font-size:26px;

    transition:.3s;

}

.clip-card:hover .play-btn{

    transform:translate(-50%,-50%) scale(1.15);

}

.clip-info{

    padding:22px;

}

.clip-info h3{

    font-size:24px;

    margin-bottom:12px;

}

.player-name{

    color:#ff9a2f;

    font-weight:600;

    margin-bottom:12px;

}

.player-name i{

    margin-right:6px;

}

.clip-category{

    display:inline-block;

    background:#ff7b00;

    color:#fff;

    padding:6px 14px;

    border-radius:30px;

    font-size:12px;

    font-weight:600;

    margin-bottom:15px;

}

.clip-description{

    color:#bbb;

    font-size:14px;

    line-height:1.6;

    margin:18px 0;

}

.watch-btn{

    display:inline-flex;

    align-items:center;

    justify-content:center;

    gap:10px;

    padding:14px 28px;

    background:linear-gradient(135deg,#ff8a00,#ff5e00);

    color:#fff;

    border:none;

    outline:none;

    border-radius:12px;

    text-decoration:none;

    font-size:17px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;

    min-width:180px;

}

.watch-btn:hover{

    transform:translateY(-3px);

    box-shadow:0 10px 25px rgba(255,120,0,.35);

}

.watch-btn i{

    font-size:18px;

}

.no-clips{

    grid-column:1/-1;

    text-align:center;

    padding:80px 20px;

}

.no-clips h2{

    font-size:36px;

    color:#ff7b00;

    margin-bottom:15px;

}

.no-clips p{

    color:#999;

}

@media(max-width:768px){

.clips-title{

    font-size:48px;

}

.clips-grid{

    grid-template-columns:1fr;

}

}

.video-modal{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.85);

    display:none;

    justify-content:center;

    align-items:center;

    z-index:9999;

}

.video-box{

    position:relative;

    width:90%;

    max-width:1100px;

    aspect-ratio:16/9;

    background:#000;

    border-radius:16px;

    overflow:visible;

}

.video-box iframe,
.video-box video,
#videoContainer{

    width:100%;

    height:100%;

    border:none;

    border-radius:16px;

}

#closeVideo{

    position:absolute;

    top:-55px;

    right:0;

    width:42px;

    height:42px;

    border-radius:50%;

    background:#ff6a00;

    display:flex;

    align-items:center;

    justify-content:center;

    color:#fff;

    font-size:28px;

    cursor:pointer;

    z-index:999999;

}

#closeVideo:hover{

    background:#ff6a00;

    transform:scale(1.1);

}

#closeVideo:hover{

    color:#ff7b00;

    transform:scale(1.15);

}

.featured-clip{

    height:500px;

    border-radius:22px;

    margin-bottom:60px;

    background:#181818;

    background-size:cover;

    background-position:center;

    position:relative;

    overflow:hidden;

}

.featured-overlay{

    position:absolute;
    inset:0;

    background:linear-gradient(
        90deg,
        rgba(0,0,0,.88) 0%,
        rgba(0,0,0,.55) 45%,
        rgba(0,0,0,.15) 100%
    );

    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:60px;

}

.featured-tag{

    display:inline-block;

    width:max-content;

    background:#ff6a00;

    padding:8px 18px;

    border-radius:30px;

    font-weight:700;

    margin-bottom:20px;

}

.featured-overlay h2{

    font-size:58px;

    margin-bottom:15px;

}

.featured-overlay p{

    color:#ddd;

    font-size:20px;

    margin-bottom:30px;

}

.featured-btn{

    display:inline-flex;

    align-items:center;

    gap:10px;

    background:linear-gradient(135deg,#ff8a00,#ff5a00);

    color:#fff;

    border:none;

    padding:16px 34px;

    border-radius:10px;

    font-size:18px;

    font-weight:700;

    cursor:pointer;

    transition:.3s;

    width:max-content;

}

.featured-btn:hover{

    transform:translateY(-3px);

    box-shadow:0 12px 30px rgba(255,120,0,.35);

}

.clips-tools{

    display:flex;

    gap:20px;

    justify-content:center;

    align-items:center;

    margin-bottom:45px;

    flex-wrap:wrap;

}

.clips-tools input,
.clips-tools select{

    width:320px;

    padding:14px 18px;

    border-radius:10px;

    border:1px solid rgba(255,255,255,.1);

    background:#161616;

    color:#fff;

    font-size:15px;

    outline:none;

}

.clips-tools input:focus,
.clips-tools select:focus{

    border-color:#ff7b00;

    box-shadow:0 0 15px rgba(255,123,0,.25);

}

</style>

</head>

<body>

<section class="clips-section">

    <div class="featured-clip">

    <div class="featured-overlay">

        <span class="featured-tag">
            🔥 FEATURED CLIP
        </span>

        <h2 id="featuredTitle">
            Loading...
        </h2>

        <p id="featuredPlayer">
            Loading...
        </p>

       <button id="featuredWatch" class="featured-btn">

    <i class="fa-solid fa-play"></i>

    Watch Now

</button>

    </div>

</div>

<h1 class="clips-title">

GAMEPLAY CLIPS

</h1>

<p class="clips-sub">

Watch Official 4 FIRE UNITED Gameplay Highlights

</p>

<div class="clips-tools">

    <input
        type="text"
        id="searchClip"
        placeholder="🔍 Search clips...">

    <select id="categoryFilter">

        <option value="">All Categories</option>

        <option>Highlights</option>

        <option>Tournament</option>

        <option>Montage</option>

        <option>Funny</option>

    </select>

</div>

<div class="clips-grid" id="clipsGrid">

</div>

</section>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>


<script src="js/firebase.js"></script>
<script src="js/clips.js"></script>

<div id="videoModal" class="video-modal">

    <div class="video-box">

        <span id="closeVideo">&times;</span>

       <div id="videoContainer"></div>

    </div>

</div>

</body>
</html>
