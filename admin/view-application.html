<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>View Application | 4 FIRE UNITED</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="CSS/dashboard.css">

</head>

<body>

<div class="main">

<div class="topbar">

<h1>APPLICATION DETAILS</h1>

<a href="applications.html" class="back-btn">

<i class="fa-solid fa-arrow-left"></i>

Back

</a>

</div>

<div class="edit-card">

<h2 id="name"></h2>

<p><strong>IGN :</strong> <span id="ign"></span></p>

<p><strong>UID :</strong> <span id="uid"></span></p>

<p><strong>Level :</strong> <span id="level"></span></p>

<p><strong>Rank :</strong> <span id="rank"></span></p>

<p><strong>Status :</strong> <span id="status"></span></p>

<p><strong>Applied On :</strong> <span id="date"></span></p>

<hr style="margin:20px 0;">

<h3>Admin Message</h3>

<textarea
    id="adminMessage"
    rows="5"
    placeholder="Write a message for the applicant..."
    style="
        width:100%;
        padding:12px;
        border-radius:8px;
        border:1px solid #444;
        background:#111;
        color:#fff;
        resize:vertical;
    "></textarea>

<div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">

    <button id="acceptBtn" class="edit-btn">
        ✅ Accept
    </button>

    <button id="rejectBtn" class="delete-btn">
        ❌ Reject
    </button>

</div>

<hr style="margin:20px 0;">

<h3>About Player</h3>

<p id="about"></p>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/view-application.js"></script>

</body>

</html>
