<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings | 4 FIRE UNITED</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="CSS/dashboard.css">

</head>

<body>

<div class="main">

<div class="topbar">

<h1>WEBSITE SETTINGS</h1>

<a href="dashboard.html" class="back-btn">

<i class="fa-solid fa-arrow-left"></i>

Back Dashboard

</a>

</div>

<div class="edit-box">

<input type="text" id="teamName" placeholder="Team Name">

<input type="email" id="email" placeholder="Contact Email">

<input type="text" id="phone" placeholder="Phone Number">

<input type="text" id="address" placeholder="Address">

<input type="text" id="logo" placeholder="Logo Path">

<input type="text" id="instagram" placeholder="Instagram Link">

<input type="text" id="youtube" placeholder="YouTube Link">

<input type="text" id="discord" placeholder="Discord Link">

<input type="text" id="facebook" placeholder="Facebook Link">

<button id="saveSettings" class="save-btn">

<i class="fa-solid fa-floppy-disk"></i>

Save Settings

</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/settings.js"></script>

</body>
</html>
