<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Player | 4 FIRE UNITED</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="CSS/dashboard.css">

</head>

<body>

<div class="main">

    <div class="topbar">

        <h1>EDIT PLAYER</h1>

        <a href="players.html" class="back-btn">

            <i class="fa-solid fa-arrow-left"></i>

            Back

        </a>

    </div>

    <div class="edit-box">

        <!-- Player Image -->

        <div class="player-image-box">

    <img id="previewImage"
         src="../images/logo/logo.png"
         alt="Player">

    <label for="playerImage" class="upload-btn">
        <i class="fa-solid fa-camera"></i>
        Upload Player Image
    </label>

    <input type="file"
           id="playerImage"
           accept="image/*"
           hidden>

</div>

        <!-- Basic -->

        <h2 class="section-title">Basic Information</h2>

        <div class="form-grid">

            <input type="text" id="name" placeholder="Player Name">

            <input type="text" id="ign" placeholder="In Game Name">

            <input type="text" id="uid" placeholder="Free Fire UID">

            <input type="text" id="guild" placeholder="Guild Name">

            <input type="text" id="role" placeholder="Role">

            <input type="text" id="language" placeholder="Language">

        </div>

        <!-- Game -->

        <h2 class="section-title">Game Information</h2>

        <div class="form-grid">

            <input type="number" id="level" placeholder="Level">

            <input type="text" id="rank" placeholder="Rank">

            <input type="text" id="kd" placeholder="K/D Ratio">

            <input type="text" id="headshot" placeholder="Headshot %">

        </div>

        <button class="save-btn" id="saveBtn">

            <i class="fa-solid fa-floppy-disk"></i>

            Save Player

        </button>

    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/edit-player.js"></script>

</body>

</html>
