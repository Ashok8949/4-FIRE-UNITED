<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Player | 4 FIRE UNITED</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css?v=1783829699314">

<link rel="stylesheet" href="CSS/dashboard.css?v=1783829699314">

<style>
body{
    visibility:hidden;
}
</style>

</head>

<body>

<div class="main">

    <div class="topbar">

        <h1>EDIT PLAYER</h1>

        <a href="players.html" class="back-btn">

            <i class="fa-solid fa-arrow-left"></i>

            Back

        </a>

    </div>

    <div class="edit-box">

        <!-- Player Image -->

        <div class="player-image-box">

            <img id="previewImage"
                 src="../images/logo/logo.png"
                 alt="Player">

            <label class="upload-btn">

    <i class="fa-solid fa-image"></i>

    Choose Player Image

</label>

<input
    type="file"
    id="image"
    accept="image/*">

        </div>

        <!-- BASIC INFORMATION -->

        <h2 class="section-title">BASIC INFORMATION</h2>

        <div class="form-grid">

            <input type="text" id="name" placeholder="Player Name">

            <input type="text" id="ign" placeholder="IGN">

            <input type="text" id="uid" placeholder="Free Fire UID">

            <input type="text" id="guild" placeholder="Guild">

            <input type="text" id="role" placeholder="Role">

            <input type="text" id="language" placeholder="Language">

            <select id="country">

    <option value="">Select Country</option>

    <option value="India">🇮🇳 India</option>

    <option value="Bangladesh">🇧🇩 Bangladesh</option>

    <option value="Nepal">🇳🇵 Nepal</option>

    <option value="Pakistan">🇵🇰 Pakistan</option>

    <option value="Brazil">🇧🇷 Brazil</option>

    <option value="Indonesia">🇮🇩 Indonesia</option>

    <option value="Thailand">🇹🇭 Thailand</option>

    <option value="Vietnam">🇻🇳 Vietnam</option>

    <option value="United States">🇺🇸 United States</option>

    <option value="Russia">🇷🇺 Russia</option>

</select>

<input
    type="number"
    id="since"
    placeholder="Joined Since (e.g. 2024)">

            <input
    type="number"
    id="displayOrder"
    placeholder="Display Order (1,2,3...)">

            <div class="checkbox-group">

    <label>

        <input type="checkbox" id="featured">

        Show on Home Page

    </label>

</div>

        </div>

        <!-- GAME INFORMATION -->

        <h2 class="section-title">GAME INFORMATION</h2>

        <div class="form-grid">

            <input type="number" id="level" placeholder="Level">

            <input type="text" id="rank" placeholder="Rank">

            <input type="text" id="kd" placeholder="KD">

            <input type="text" id="headshot" placeholder="Headshot %">

            <input type="number" id="matches" placeholder="Matches">

            <input type="number" id="booyah" placeholder="Booyah">

            <input
    type="text"
    id="weaponName"
    placeholder="Favorite Weapon">

<input
    type="text"
    id="weaponType"
    placeholder="Weapon Type (Shotgun, AR, SMG...)">

<input
    type="text"
    id="weaponQuote"
    placeholder="Weapon Quote">

<label class="upload-btn">

    <i class="fa-solid fa-gun"></i>

    Choose Weapon Image

</label>

<input
    type="file"
    id="weaponImage"
    accept="image/*">

        </div>

        <!-- SOCIAL MEDIA -->

        <h2 class="section-title">SOCIAL MEDIA</h2>

        <div class="form-grid">

            <input
                type="url"
                id="instagram"
                placeholder="Instagram Profile Link">

            <input
                type="url"
                id="youtube"
                placeholder="YouTube Channel Link">

            <input
                type="url"
                id="discord"
                placeholder="Discord Profile / Invite Link">

            <input
                type="url"
                id="facebook"
                placeholder="Facebook Profile Link">

        </div>

        <progress
    id="uploadProgress"
    value="0"
    max="100"
    style="
        width:100%;
        display:none;
        margin:18px 0;
    ">
</progress>

<p
    id="uploadStatus"
    style="
        display:none;
        color:#ff8a00;
        font-weight:600;
        margin-bottom:15px;
    ">
</p>

        <button class="save-btn" id="saveBtn">

            <i class="fa-solid fa-floppy-disk"></i>

            Save Player

        </button>

    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js?v=1783829699314"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js?v=1783829699314"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js?v=1783829699314"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js?v=1783829699314"></script>

<script src="js/firebase.js?v=1783829699314"></script>
<script src="js/auth-guard.js?v=1783829699314"></script>
<script src="js/edit-player.js?v=1783829699314"></script>

</body>

</html>
