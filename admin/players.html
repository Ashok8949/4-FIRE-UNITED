<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player Manager | 4 FIRE UNITED</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css?v=1783829699314">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<link rel="stylesheet" href="CSS/dashboard.css?v=1783829699314">

<style>
body{
    visibility:hidden;
}
</style>

</head>

<body>

<div class="main">

<div class="topbar">

    <h1>PLAYER MANAGER</h1>

    <div class="top-actions">

    <a href="dashboard.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
        Back Dashboard
    </a>

    <div class="search-box">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
            type="text"
            id="searchPlayer"
            placeholder="Search Player">

    </div>

    <a href="add-player.html" class="add-btn">
        <i class="fa-solid fa-plus"></i>
        Add Player
    </a>

</div>

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th>Image</th>
<th>Name</th>
<th>IGN</th>
<th>Role</th>
<th>Level</th>
<th>Rank</th>
<th>Action</th>

</tr>

</thead>

<tbody id="playerTable">

</tbody>

</table>

</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js?v=1783829699314"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js?v=1783829699314"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js?v=1783829699314"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js?v=1783829699314"></script>

<script src="js/firebase.js?v=1783829699314"></script>
<script src="js/auth-guard.js?v=1783829699314"></script>
<script src="js/player-manager.js?v=1783829699314"></script>

</body>

</html>
