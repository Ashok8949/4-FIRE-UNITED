<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Tournament | 4 FIRE UNITED</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css?v=1783829699314">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<link rel="stylesheet" href="CSS/dashboard.css?v=1783829699314">


<style>
body{
    visibility:hidden;
}
</style>
</head>

<body>

<div class="main">

    <div class="topbar">

        <h1>ADD TOURNAMENT</h1>

        <a href="tournaments.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
            Back
        </a>

    </div>

    <div class="edit-card">

        <h2 class="section-title">TOURNAMENT INFORMATION</h2>

        <div class="form-grid">

            <input type="text" id="title" placeholder="Tournament Title">

            <input type="text" id="game" placeholder="Game">

            <input type="text" id="mode" placeholder="Mode">

            <input type="date" id="date">

            <input type="time" id="time">

            <input type="text" id="prize" placeholder="Prize Pool">

            <input type="text" id="status" placeholder="Status">

            <input type="text" id="registration" placeholder="Registration Link">
            <input
    type="text"
    id="registration"
    placeholder="Registration Link">

<input
    type="text"
    id="liveLink"
    placeholder="Live Match Link (YouTube / Loco / Rooter)">

<select id="liveStatus">

    <option value="Upcoming">Upcoming</option>

    <option value="Live">🔴 Live</option>

    <option value="Ended">Ended</option>

</select>

        </div>

        <button id="saveTournament" class="save-btn">

            <i class="fa-solid fa-floppy-disk"></i>

            Save Tournament

        </button>

    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js?v=1783829699314"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js?v=1783829699314"></script>

</body>

</html>
