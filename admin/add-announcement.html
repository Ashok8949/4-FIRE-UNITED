<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Announcement | 4 FIRE UNITED</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="CSS/dashboard.css">

<style>
body{
    visibility:hidden;
}
</style>

</head>

<body>

<div class="main">

<div class="topbar">

<h1>ADD ANNOUNCEMENT</h1>

<a href="announcements.html" class="back-btn">

<i class="fa-solid fa-arrow-left"></i>

Back

</a>

</div>

<div class="edit-card">

<h2 class="section-title">

ANNOUNCEMENT INFORMATION

</h2>

<div class="form-grid">

<input
type="text"
id="title"
placeholder="Announcement Title">

<input
type="text"
id="category"
placeholder="Category">

<input
type="date"
id="date">

<input
type="text"
id="status"
placeholder="Status">

</div>

<textarea
id="description"
placeholder="Announcement Description"
style="width:100%;height:180px;margin-top:20px;padding:15px;border:none;border-radius:12px;background:#1a1a1a;color:#fff;font-size:15px;resize:none;"></textarea>

<button
id="saveAnnouncement"
class="save-btn">

<i class="fa-solid fa-floppy-disk"></i>

Save Announcement

</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>

<script src="js/firebase.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/add-announcement.js"></script>

</body>

</html>
